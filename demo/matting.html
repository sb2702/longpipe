<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Longpipe demo — matting</title>
    <style>
      body { margin: 0; background: #111; color: #ddd; font-family: system-ui, sans-serif; }
      a { color: #6cf; }
      .topbar { padding: 8px 16px; }
      .row { display: flex; gap: 16px; padding: 16px; align-items: flex-start; }
      .panel { display: flex; flex-direction: column; gap: 8px; }
      canvas, img { display: block; border: 1px solid #333; background: #222; }
      .label { font-size: 12px; color: #888; }
      #status { padding: 8px 16px; font-family: ui-monospace, monospace; font-size: 12px; color: #6cf; }
      .controls { padding: 0 16px 16px; }
      button { background: #333; color: #ddd; border: 1px solid #555; padding: 6px 12px; cursor: pointer; }
      button:hover { background: #444; }
    </style>
  </head>
  <body>
    <div class="topbar"><a href="/">← demos</a></div>
    <div id="status">loading…</div>
    <div class="controls">
      <label>backend:
        <select id="backend">
          <option value="webgpu">WebGPU</option>
          <option value="webgl">WebGL</option>
        </select>
      </label>
      <label style="margin-left:16px">precision:
        <select id="dtype">
          <option value="f32">fp32</option>
          <option value="f16">fp16</option>
        </select>
      </label>
      <label style="margin-left:16px">upscaler:
        <select id="upscaler">
          <option value="bilinear">bilinear</option>
          <option value="bicubic">bicubic</option>
        </select>
      </label>
      <label style="margin-left:16px">background:
        <select id="bgMode">
          <option value="solid">solid color</option>
          <option value="image">image (demo.jpg)</option>
          <option value="blur">blur of input</option>
        </select>
      </label>
      <label style="margin-left:16px" id="bgColorLabel">color:
        <input type="color" id="bgColor" value="#00b050" />
      </label>
      <label style="margin-left:16px; display:none" id="bgSigmaLabel">sigma:
        <input type="range" id="bgSigma" min="1" max="20" step="0.5" value="8" />
        <span id="bgSigmaVal">8</span>
      </label>
      <button id="run" style="margin-left:16px">run</button>
    </div>
    <div class="row">
      <div class="panel">
        <span class="label">input image (network resolution)</span>
        <canvas id="inputCanvas"></canvas>
      </div>
      <div class="panel">
        <span class="label">composited output (canvas, full resolution)</span>
        <canvas id="outputCanvas"></canvas>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
